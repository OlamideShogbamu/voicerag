name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-frontend:
    name: Lint / TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm --filter @voicerag/frontend exec tsc --noEmit

  test-backend:
    name: Test / Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: cd apps/backend && uv sync
      - run: cd apps/backend && uv run pytest --tb=short

  test-agents:
    name: Test / Agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: cd apps/agents && uv sync
      - run: cd apps/agents && uv run pytest --tb=short
